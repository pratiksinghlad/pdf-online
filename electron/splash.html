<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Online</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff; /* Bright, clean background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .brand-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      animation: pulse 1.5s infinite ease-in-out;
      margin-bottom: 24px;
      /* Improve rendering quality of the image */
      image-rendering: -webkit-optimize-contrast;
    }

    .title {
      font-weight: 800;
      font-size: 28px;
      color: #922b21;
      letter-spacing: -0.5px;
      margin: 0;
    }

    .subtitle {
      font-weight: 500;
      font-size: 14px;
      color: #718096;
      margin-top: 8px;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
      100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }

    /* System Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1a202c; /* Clean dark gray */
      }
      .title {
        color: #e53e3e; /* Slightly brighter red for dark mode */
      }
      .subtitle {
        color: #a0aec0;
      }
    }
  </style>
</head>
<body>
  <div class="brand-container">
    <img src="../public/icon.png" alt="PDF Online Logo" class="logo" />
    <h1 class="title">PDF online</h1>
    <p class="subtitle">Starting Secure Environment...</p>
  </div>
</body>
</html>
