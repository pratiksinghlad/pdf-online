<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>
      PDF online - All pdf tools in one place | Combine PDFs Privately
    </title>
    <meta
      name="description"
      content="Merge PDF files for free directly in your browser. 100% private - your files never leave your device. No uploads, no sign-up, no limits."
    />
    <meta
      name="keywords"
      content="PDF merge, combine PDF, merge PDF online, free PDF merger, private PDF tool"
    />
    <meta name="author" content="PDF online" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="PDF online - All pdf tools in one place"
    />
    <meta
      property="og:description"
      content="Combine PDFs privately in your browser. No uploads, no sign-up required."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="PDF online - All pdf tools in one place"
    />
    <meta
      name="twitter:description"
      content="Combine PDFs privately in your browser. No uploads required."
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#e53e3e" />

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PDF Online",
      "url": "https://pdf-online.io",
      "description": "Secure, 100% client-side PDF tools. Merge, Compress, Encrypt, and convert Images to PDF without uploading your files.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Merge PDF files",
        "Compress PDF files",
        "Encrypt PDF with password",
        "Convert Images to PDF"
      ],
      "author": {
        "@type": "Organization",
        "name": "PDF Online"
      },
      "browserRequirements": "Requires JavaScript and modern web browser",
      "permissions": "Handles files locally in-browser"
    }
    </script>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body autocomplete="off">
    <div id="root">
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          font-family: sans-serif;
          color: #e53e3e;
          font-size: 1.5rem;
          font-weight: bold;
        "
      >
        Loading PDF Online...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
